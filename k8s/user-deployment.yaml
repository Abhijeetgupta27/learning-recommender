apiVersion: apps/v1

kind: Deployment

metadata:
  name: user-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:

    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service

          image: learning-recommender-user-service:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8002