apiVersion: apps/v1

kind: Deployment

metadata:
  name: gateway-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:

    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway

          image: learning-recommender-api-gateway:v2

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: app-secret