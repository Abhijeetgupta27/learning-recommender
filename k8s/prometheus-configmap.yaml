apiVersion: v1

kind: ConfigMap

metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

      - job_name: "api-gateway"

        static_configs:
          - targets: ["api-gateway:8000"]

      - job_name: "recommendation-service"

        static_configs:
          - targets: ["recommendation-service:8001"]

      - job_name: "user-service"

        static_configs:
          - targets: ["user-service:8002"]

      - job_name: "feedback-service"

        static_configs:
          - targets: ["feedback-service:8003"]